<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastFlow ML Inference Dashboard</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-red: #ef4444;
            --accent-gray: #64748b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .stat-card .value {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
        }

        .val-mcp { color: var(--accent-purple); }
        .val-noise { color: var(--text-muted); }
        .val-acc { color: var(--accent-green); }

        .flows-panel {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            margin: 0;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 15px 20px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 15px 20px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-variant-numeric: tabular-nums;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-mcp {
            background: rgba(139, 92, 246, 0.2);
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .badge-noise {
            background: rgba(100, 116, 139, 0.2);
            color: #cbd5e1;
            border: 1px solid rgba(100, 116, 139, 0.3);
        }

        .badge-error {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-purple);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .server-label {
            font-family: monospace;
            color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .truth-match {
            color: var(--accent-green);
        }
        .truth-mismatch {
            color: var(--accent-red);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <h1>FastFlow AI</h1>
                <p>Real-Time TLS Traffic Inference & Classification</p>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                Live System Active
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>System Uptime</h3>
                <p class="value" id="stat-uptime">00:00:00</p>
            </div>
            <div class="stat-card">
                <h3>Total Analyzed</h3>
                <p class="value" id="stat-total">0</p>
            </div>
            <div class="stat-card">
                <h3>MCP Detected</h3>
                <p class="value val-mcp" id="stat-mcp">0</p>
            </div>
            <div class="stat-card">
                <h3>Noise Ignored</h3>
                <p class="value val-noise" id="stat-noise">0</p>
            </div>
            <div class="stat-card">
                <h3>Model Accuracy</h3>
                <p class="value val-acc" id="stat-acc">--%</p>
            </div>
            <div class="stat-card">
                <h3>Avg Latency</h3>
                <p class="value" id="stat-latency">--ms</p>
            </div>
        </div>

        <div class="flows-panel">
            <div class="panel-header">
                <h2>Live Inference Feed</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Flow ID (Src → Dst)</th>
                        <th>Pkts</th>
                        <th>Duration</th>
                        <th>Prediction</th>
                        <th>Confidence</th>
                        <th>Target Server</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="flows-body">
                    <!-- Data will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const MCP_SERVERS = {
            1: "filesystem",
            2: "github",
            3: "brave-search",
            4: "memory",
            5: "fetch",
            6: "slack"
        };

        function formatUptime(seconds) {
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function getPredictionBadge(label) {
            if (label >= 1) return `<span class="badge badge-mcp">MCP</span>`;
            return `<span class="badge badge-noise">NOISE</span>`;
        }
        
        function getServerLabel(label) {
            if (label >= 1 && MCP_SERVERS[label]) {
                return `<span class="server-label">${MCP_SERVERS[label]}</span>`;
            }
            return `<span class="text-muted">-</span>`;
        }
        
        function getStatus(label, gt) {
            if (gt === null || gt === undefined || gt === 255 || gt === -1) {
                return `<span style="color: #64748b;">Pending</span>`;
            }
            const isMcp = label >= 1;
            const isMcpGt = gt >= 1;
            
            if (isMcp === isMcpGt) {
                return `<span class="truth-match">✓ Correct</span>`;
            } else {
                return `<span class="truth-mismatch">✗ Error</span>`;
            }
        }

        async function updateDashboard() {
            try {
                const [statsRes, flowsRes] = await Promise.all([
                    fetch('/api/stats'),
                    fetch('/api/flows')
                ]);
                
                const stats = await statsRes.json();
                const flows = await flowsRes.json();

                // Update Stats
                document.getElementById('stat-uptime').innerText = formatUptime(stats.uptime);
                document.getElementById('stat-total').innerText = stats.total_flows;
                document.getElementById('stat-mcp').innerText = stats.total_mcp;
                document.getElementById('stat-noise').innerText = stats.total_noise;
                document.getElementById('stat-acc').innerText = stats.accuracy ? `${stats.accuracy.toFixed(1)}%` : '--%';
                document.getElementById('stat-latency').innerText = stats.avg_latency ? `${stats.avg_latency.toFixed(2)}ms` : '--ms';

                // Update Table
                const tbody = document.getElementById('flows-body');
                tbody.innerHTML = '';
                
                flows.forEach(flow => {
                    const conf = flow.label >= 1 ? flow.proba_mcp : flow.proba_noise;
                    const confPct = (conf * 100).toFixed(1);
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-family: monospace; color: #e2e8f0;">${flow.flow_display}</td>
                        <td>${flow.pkt_count}</td>
                        <td>${flow.duration_s.toFixed(2)}s</td>
                        <td>${getPredictionBadge(flow.label)}</td>
                        <td>
                            ${confPct}%
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${confPct}%; ${flow.label === 0 ? 'background: #64748b;' : ''}"></div>
                            </div>
                        </td>
                        <td>${getServerLabel(flow.label)}</td>
                        <td>${getStatus(flow.label, flow.ground_truth)}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error("Dashboard update failed:", err);
            }
        }

        // Poll every 1.5 seconds
        setInterval(updateDashboard, 1500);
        updateDashboard();
    </script>
</body>
</html>
